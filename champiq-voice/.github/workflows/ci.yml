name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Frontend Build and Test
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build
        env:
          VITE_VOICE_API_URL: ${{ secrets.VITE_VOICE_API_URL }}
          VITE_VOICE_API_KEY: ${{ secrets.VITE_VOICE_API_KEY }}
          VITE_AGENT_ID: ${{ secrets.VITE_AGENT_ID }}
          VITE_PHONE_NUMBER_ID: ${{ secrets.VITE_PHONE_NUMBER_ID }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 7

  # Backend Build and Test
  backend-build:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run TypeScript check
        run: |
          cd backend
          npx tsc --noEmit

      - name: Build backend
        run: |
          cd backend
          npm run build

  # Docker Build Test
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: champqualifier:test
          build-args: |
            VITE_VOICE_API_URL=https://api.elevenlabs.io/v1
            VITE_VOICE_API_KEY=test
            VITE_AGENT_ID=test
            VITE_PHONE_NUMBER_ID=test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Status Check
  status-check:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build, docker-build]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.frontend-build.result }}" != "success" ] ||
             [ "${{ needs.backend-build.result }}" != "success" ] ||
             [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed successfully!"
