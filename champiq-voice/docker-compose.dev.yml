# Dev: just Redis — run the CLI locally with `npm run cli serve` or `npm run serve`
services:
  redis:
    image: redis:7-alpine
    container_name: champiq-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_dev_data:
    driver: local
