services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: champiq-canvas:local
    container_name: champiq-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/champiq
      REDIS_URL: redis://redis:6379/0
      FERNET_KEY: ${FERNET_KEY}
      CHAMPMAIL_BASE_URL: ${CHAMPMAIL_BASE_URL:-http://host.docker.internal:8001}
      CHAMPGRAPH_BASE_URL: ${CHAMPGRAPH_BASE_URL:-http://host.docker.internal:3001}
      LAKEB2B_BASE_URL: ${LAKEB2B_BASE_URL:-http://host.docker.internal:8002}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-sonnet-4}
      OPENROUTER_REFERRER: ${OPENROUTER_REFERRER:-https://champiq.local}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-ChampIQ Canvas}
    ports:
      - "58000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:16-alpine
    container_name: champiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: champiq
    volumes:
      - champiq_postgres:/var/lib/postgresql/data
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d champiq"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: champiq-redis
    restart: unless-stopped
    ports:
      - "56379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - champiq_redis:/data

volumes:
  champiq_postgres:
  champiq_redis:
